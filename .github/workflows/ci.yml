name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ddr_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ddr_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: ddr_ai_system
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ddr_ai_system/pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Repository hygiene
        working-directory: .
        run: |
          if git ls-files | grep -E '(^|/)(\.venv|venv)/|\.db-(wal|shm)$|(^|/)\.env(\.local)?$|(^|/)\.streamlit/secrets\.toml$'; then
            echo "Forbidden generated or secret-bearing path is tracked."
            exit 1
          fi
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy src
      - name: Prepare dedicated PostgreSQL persistence database
        run: >-
          python -c "import psycopg; connection = psycopg.connect(
          'postgresql://postgres:postgres@localhost:5432/postgres', autocommit=True);
          connection.execute('CREATE DATABASE ddr_seed_test'); connection.close()"
      - name: Tests
        env:
          DDR_TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ddr_seed_test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q src streamlit_app.py
      - name: SQLite integrity and revision
        run: >-
          python -c "import sqlite3; c=sqlite3.connect('data/processed/ddr_ai.db');
          assert c.execute('pragma integrity_check').fetchone()==('ok',);
          assert c.execute('pragma foreign_key_check').fetchall()==[];
          assert c.execute('select version_num from alembic_version').fetchone()==('0005',)"
      - name: PostgreSQL migration
        env:
          DDR_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ddr_ci
        run: python -m alembic upgrade head
