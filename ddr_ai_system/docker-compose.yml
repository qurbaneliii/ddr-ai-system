services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DDR_DATABASE_URL: sqlite:////app/data/processed/ddr_ai.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ddr_ai
      POSTGRES_USER: ddr_ai
      POSTGRES_PASSWORD: local_demo_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddr_ai -d ddr_ai"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

